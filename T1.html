<script>
function joinNow(){
window.location.href="https://whatsapp.com/channel/0029VaeylYYBPzjVNomWuZ0T";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

document.addEventListener("DOMContentLoaded",async function(){
const TARGET_ID="Tamil";
const frame=document.getElementById("videoFrame");
const titleHeader=document.getElementById("pageTitle");
const errorBox=document.getElementById("errorBox");

const jsonSources=[
"https://sayan-json-official.pages.dev/ID.json",
"https://allrounderid.pages.dev/id.json"
];

let foundMatch=null;

for(let url of jsonSources){
if(foundMatch)break;
try{
const response=await fetch(url);
const data=await response.json();
if(data.iframes){
foundMatch=data.iframes.find(item=>item.id===TARGET_ID);
}
}catch(e){}
}

if(foundMatch){
frame.src=foundMatch.iframeSrc;
titleHeader.innerText=foundMatch.name;
document.title=foundMatch.name;
}else{
errorBox.style.display="block";
titleHeader.innerText="STREAM NOT FOUND";
}

document.getElementById("shareBtn").onclick=async function(){
const urlToShare=window.location.href;
try{
await navigator.clipboard.writeText(urlToShare);
}catch(err){}
if(navigator.share){
try{
await navigator.share({
title:document.title,
text:'Watch this live stream now!',
url:urlToShare
});
}catch(err){}
}else{
alert("Link Copied to Clipboard!");
}
};

document.addEventListener('fullscreenchange',()=>{
if(document.fullscreenElement&&screen.orientation){
screen.orientation.lock('landscape').catch(()=>{});
}
});
});
</script>
