
<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Prime TV • Dreamly Info</title>
  <meta name="referrer" content="no-referrer">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" />

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:system-ui, -apple-system, sans-serif}

    .shaka-video-container{
      position:fixed;
      inset:0;
      background:#000;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    video{
      width:100%;
      height:100%;
      object-fit:contain;
      background:#000;
    }

    .shaka-volume-bar-container,
    .shaka-spinner-container { display:none!important; }

    .custom-watermark{
      position:absolute;
      z-index:40;
      pointer-events:none;
      top:65%;
      left:6%;
      transform: translateY(-50%);
      font-size:11px;
      font-weight:600;
      color: rgba(255, 255, 255, 0.12);
    }

    @media(max-width:700px){
      .custom-watermark{ font-size:9px; top:60%; left:16%; }
    }
  </style>
</head>
<body>

  <div class="shaka-video-container" id="player-container">
    <video id="video" autoplay playsinline preload="metadata"></video>
    <div class="custom-watermark">‎ ‎ ‎ ‎ ‎ ‎ ‎ ‎ Sayan Official ™</div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      shaka.polyfill.installAll();
      if (!shaka.Player.isBrowserSupported()) return;

      const videoEl = document.getElementById('video');
      const container = document.getElementById('player-container');
      const urlParams = new URLSearchParams(window.location.search);
      const requestedId = urlParams.get('id') || urlParams.get('channel');

      if (!requestedId) {
        alert("Please provide a Channel ID (e.g., ?id=204)");
        return;
      }

      let streamUrl = "";
      let drmConfig = { clearKeys: {} };
      let cookieHeader = "";

      try {
        const [chRes, cookRes] = await Promise.all([
          fetch('https://allrounderid.pages.dev/api/jiotv2.json', { cache: 'no-store' }),
          fetch('https://raw.githubusercontent.com/24sports-net/cookie-updater/refs/heads/main/cookie.json', { cache: 'no-store' })
        ]);

        const allChannels = await chRes.json();
        const cookieData = await cookRes.json();

        const channel = allChannels.find(ch => String(ch.channel_id || ch.id) === String(requestedId));

        if (channel) {
          streamUrl = (channel.channel_url || channel.url || "").split('?')[0];
          if (channel.keyId && channel.key) {
            drmConfig.clearKeys[channel.keyId] = channel.key;
          }
          cookieHeader = channel.cookie || cookieData.cookieHeader || cookieData.cookie;
          document.title = `${channel.channel_name || "Live"} - Sayan Official`;
        } else {
          alert("Channel Not Found!");
          return;
        }
      } catch (e) {
        console.error("Data fetch error");
      }

      const player = new shaka.Player();
      await player.attach(videoEl);
      const ui = new shaka.ui.Overlay(player, container, videoEl);

      ui.configure({
        controlPanelElements: ['play_pause','time_and_duration','spacer','language','captions','picture_in_picture','quality','fullscreen'],
        seekBarColors: {
          base: 'white',
          buffered: 'red',
          played: 'green'
        }
      });

      player.configure({
        drm: drmConfig,
        manifest: {
          defaultPresentationDelay: 5 
        },
        streaming: {
          safeSeekOffset: 5,
          bufferingGoal: 10,
          rebufferingGoal: 2,
          lowLatencyMode: true
        }
      });

      player.getNetworkingEngine().registerRequestFilter((type, request) => {
        request.headers['Referer'] = 'https://www.jiotv.com/';
        request.headers['User-Agent'] = 'plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6';

        if (cookieHeader) {
          request.headers['Cookie'] = cookieHeader;
          if ((type === shaka.net.NetworkingEngine.RequestType.MANIFEST || type === shaka.net.NetworkingEngine.RequestType.SEGMENT) && !request.uris[0].includes('__hdnea__')) {
            const sep = request.uris[0].includes('?') ? '&' : '?';
            request.uris[0] += sep + cookieHeader;
          }
        }
      });

      try {
        await player.load(streamUrl);
        videoEl.play();
      } catch (e) {
        console.error("Stream load error", e);
      }
    });
  </script>

</html>
